# AppKit-E7 (AK-E7-AIML) Machine Configuration
#
# Based on appkit-e8.conf with E7-specific overrides:
#   - 32MB ISSI HyperRAM (not 64MB Macronix)
#   - ISSI OSPI flash (IS25WX256)
#   - DTB at 0x80200000 (SE REV_B4 minimum)
#   - ENABLE_PIE=1 required

# Include architecture-specific tuning for Cortex-A32
require ${ALIF_MSD_BASE}/conf/machine/include/arm/armv8a/tune-cortexa32.inc

DEFAULTTUNE = "cortexa32"

# Platform-specific settings
TF-A_PLATFORM = "devkit_e7"
BL32_IN_XIP_MEM ?= "1"
BL32_XIP_BASE ?= "0x80002000"
A32_HWSEM_MST_ID ?= "0xA1B2C3D4"
UART ??= "2"
SMP ?= "1"
BASE_IMAGE ??= "1"
BASE_IMAGE2 ??= "0"
BASE_IMAGE3 ??= "0"
BASE_IMAGE4 ??= "0"
BASE_IMAGE5 ??= "0"
BASE_IMAGE7 ??= "0"

# Common memory addresses
KERNEL_XIP_DEFAULT ?= "0x02000000"
KERNEL_XIP_HYPRAM ?= "0xA0000000"

# HYPRAM settings — E7 uses ISSI HyperRAM (32MB)
# HYPRAM_ONLY=1 tells the DCT tool to set MEM_HYPER_STATUS to "okay" in the DTB.
# Without this, upstream default is "disabled" and HyperRAM won't be available.
HYPRAM_ONLY = "1"

# PHYS_OFFSET stays at SRAM (0x02000000) — matching the working boot setup.
# HyperRAM is enabled in the DTB as additional memory but SRAM is the boot memory.
# XIP kernels can't use HyperRAM as PHYS_OFFSET because CONFIG_ARM_VIRT_EXT
# (needed for Hyp mode entry) depends on !XIP_KERNEL.
KERNEL_XIP_RAM = "${KERNEL_XIP_DEFAULT}"

# TF-A HyperRAM/flash init flags
# Note: TF-A only understands HYPRAM_EN and FLASH_EN (not ISSI_HYPERRAM_EN/AP_HYPERRAM_EN)
AP_HYPERRAM_EN = "0"
ISSI_HYPERRAM_EN = "1"

# Boot from OSPI
OSPI_BOOT ??= "${@'1' if d.getVar('BASE_IMAGE3') == '1' or d.getVar('BASE_IMAGE7') == '1' else '0'}"
OSPI_BOOT_ENC ??= "0"

# Include OSPI configuration files if enabled
include ${@bb.utils.contains('OSPI_BOOT', '1', 'conf/machine/include/ospi-config.inc','', d)}
include ${@bb.utils.contains('OSPI_BOOT_ENC', '1', 'conf/machine/include/ospi-enc-config.inc','', d)}

# E7 uses ISSI flash, not Macronix — override ospi-config.inc defaults
# (ospi-config.inc assumes appkit = Macronix, devkit = ISSI based on machine name prefix)
ISSI_FLASH_EN = "${@'1' if d.getVar('OSPI_BOOT') == '1' else '0'}"
MX_FLASH_EN = "0"

# Flash and encryption settings
AES_EN ??= "0"
AES_ENC_KEY ??= ""

ADC_MODE ??= "0"

# Trusted SRAM base — SRAM0 region (SEROM v1.100.0 doesn't support SRAM1 remap)
ALIF_TRUSTED_SRAM_BASE ??= "0x02300000"

# TF-A options — ENABLE_PIE required for E7
# Note: ENABLE_STACK_PROTECTOR=strong omitted — upstream TF-A is missing
# devkit_e7_stack_protector.c (referenced in Makefile but not in repo)
TF-A_EXTRA_OPTIONS += " \
            RESET_TO_SP_MIN=1 \
            ARM_LINUX_KERNEL_AS_BL33=1 \
            PRELOADED_BL33_BASE=${XIP_KERNEL_LOAD_ADDR} \
            ARM_PRELOADED_DTB_BASE=${KERNEL_DTB_ADDR} \
            ALIF_TRUSTED_SRAM_BASE=${ALIF_TRUSTED_SRAM_BASE} \
            ENABLE_PIE=1 \
            BL32_IN_XIP_MEM=${BL32_IN_XIP_MEM} \
            BL32_XIP_BASE=${BL32_XIP_BASE} \
            AP_HYPERRAM_EN=${AP_HYPERRAM_EN} \
            ISSI_HYPERRAM_EN=${ISSI_HYPERRAM_EN} \
            MX_FLASH_EN=${MX_FLASH_EN} \
            ISSI_FLASH_EN=${ISSI_FLASH_EN} \
            AES_EN=${AES_EN} \
            AES_ENC_KEY=${AES_ENC_KEY} \
            UART=${UART} \
            "

# Kernel image and device tree settings
KERNEL_IMAGETYPE = "xipImage"
KERNEL_DEVICETREE = "${@bb.utils.contains('SMP', '0', 'alif/ensemble/appkit/appkit-e7.dtb', 'alif/ensemble/appkit/appkit-e7.dtb', d)}"
KBUILD_DEFCONFIG = "appkit_e8_defconfig"
KERNEL_DTB_ADDR ?= "0x80200000"
XIP_KERNEL_LOAD_ADDR ?= "0x80020000"
KERNEL_MTD_START_ADDR ?= "${@'0xC0000000' if d.getVar('BASE_IMAGE2') == '1' else '0x80380000'}"
KERNEL_MTD_LEN ?= "${@'0x400000' if d.getVar('BASE_IMAGE2') == '1' else '200000'}"

# Preferred kernel provider
PREFERRED_PROVIDER_virtual/kernel:forcevariable = "linux-alif"

# DCT tool settings
DTS_MACRO_FILE ?= "/arch/arm/boot/dts/alif/ensemble/common/devkit_ex_dct_defines.h"
DTS_MACRO_FILE_ORG ?= "/arch/arm/boot/dts/alif/ensemble/common/devkit_ex_dct_defines.h.org"

# Serial console settings
SERIAL_CONSOLES ?= "115200;ttyS0 ${@bb.utils.contains('DISTRO_FEATURES', 'apss-debug', '', '115200;ttyS1 115200;ttyS2 115200;ttyS3', d)}"
